[aliases]
CMD_WAIT_MILLIS      = 0x02  # command (arg: 1,2,3 or 4 bytes)
CMD_WRITE_REGISTER   = 0x03  # command (arg: 8 bytes)
CMD_I2C_BAUDRATE     = 0x04  # command (arg: 1,2,3 or 4 bytes)
CMD_SWITCH_I2C_PORT  = 0x0D  # command (arg: 1 byte) -> arg: 0 = master-, 1 = secondary-channel
CMD_I2C_RETRYCOUNT   = 0x05  # command (arg: 1 byte)
CMD_SUB_COMMAND      = 0x0F
CMD_CSI2_LANE_MAP    = 0x03

ADR_POTI             = 0x50  # address: poti
ADR_SENSOR           = 0x20  # address: image sensor 
ADR_MACHXO           = 0x84  # address: machxo slave
ADR_SERIALIZER       = 0x30  # address: serializer
ADR_DESERIALIZER     = 0x60  # address: deserializer


[event-list]
# reset camera
0 = [sx_proframe_init]
0 = [csi2_lane_mapping]
0 = [set_poc]
0 = [disable_poc_and_phy]
0 = [enable_poc_and_phy]

# configure deserializer 0
1 = [enable_des0]
1 = [enable_des0_i2c_bus]
1 = [init_des]

# configure deserializer 1
2 = [enable_des1]
2 = [enable_des1_i2c_bus]
2 = [init_des]

[sx_proframe_init]
# Set I2C Baudrate
CMD_I2C_BAUDRATE      3 1000000                           # 1 MBaud
CMD_I2C_RETRYCOUNT    1 3                                 # retry 3 times

[csi2_lane_mapping]
CMD_SUB_COMMAND       1 CMD_CSI2_LANE_MAP

[set_poc]
CMD_WRITE_REGISTER   12 0x00000020 0x00000004 0x00000004  # enable internal i2c channel
ADR_POTI              2 0x11 0xff                         # set poc for slot 0: 0xff for 8V
ADR_POTI              2 0x12 0xff                         # set poc for slot 1: 0xff for 8V

[disable_poc_and_phy]
CMD_WRITE_REGISTER   12 0x00000030 0x00000004 0x00000004  # disable PoC and reset MIPI D-PHY bank
CMD_WAIT_MILLIS       1 100

[enable_poc_and_phy]
CMD_WRITE_REGISTER   12 0x00000030 0x00000000 0x00000004  # release MIPI D-PHY Bank reset		
CMD_WRITE_REGISTER   12 0x00000030 0x00000002 0x00000004  # enable PoC
CMD_WAIT_MILLIS       1 200

[enable_des0]
CMD_WRITE_REGISTER   12 0x00000020 0x00000002 0x00000004  # enable I2C_INT internal i2c channel
CMD_WAIT_MILLIS       1 50
ADR_MACHXO            3 0x01 0x00 0x00                    # disable all
CMD_WAIT_MILLIS       2 500
ADR_MACHXO            3 0x01 0x00 0x08                    # enable deserializer #1
CMD_WAIT_MILLIS       1 100

[enable_des1]
CMD_WRITE_REGISTER   12 0x00000020 0x00000002 0x00000004  # enable internal i2c channel
CMD_WAIT_MILLIS       1 50
ADR_MACHXO            3 0x01 0x03 0x00                    # disable all
CMD_WAIT_MILLIS       2 500
ADR_MACHXO            3 0x01 0x03 0x08                    # enable deserializer #2
CMD_WAIT_MILLIS       1 100

[enable_des0_i2c_bus]
CMD_WRITE_REGISTER   12 0x00000020 0x00000008 0x00000004 # enable I2C_EXT0 external i2c channel

[enable_des1_i2c_bus]
CMD_WRITE_REGISTER   12 0x00000020 0x00000020 0x00000004 # enable I2C_EXT2 external i2c channel


[init_des]
ADR_DESERIALIZER 2 0xB0 0x1C # reset CSI analog register
ADR_DESERIALIZER 2 0xB1 0x15 # reset CSI analog register
ADR_DESERIALIZER 2 0xB2 0x30 # reset CSI analog register
ADR_DESERIALIZER 2 0xB2 0x00 # reset CSI analog register
CMD_WAIT_MILLIS       1 100
ADR_DESERIALIZER 2 0xB3 0x00 # disable BIST     

#RX0 settings
ADR_DESERIALIZER 2 0x4C 0x01 # select RX port 0
ADR_DESERIALIZER 2 0x58 0x5E # back channel settings
ADR_DESERIALIZER 2 0x5B 0x39 # serializer slave address bypass adapter
ADR_DESERIALIZER 2 0x5C 0x38 # serializer alias address bypass adapter
ADR_DESERIALIZER 2 0x5D 0x20 # SENSOR slave address
ADR_DESERIALIZER 2 0x65 0x20 # SENSOR alias address
ADR_DESERIALIZER 2 0x5E 0x30 # SER in CAM slave address
ADR_DESERIALIZER 2 0x66 0x30 # SER in CAM alias address

#ADR_DESERIALIZER 2 0x1F 0x02 # 800MBit/sec CSI-2 datarate (default)
#ADR_DESERIALIZER 2 0x32 0x01 # reserved register???
ADR_DESERIALIZER 2 0x33 0x03 # enable CSI-2 output with 4 lanes
ADR_DESERIALIZER 2 0x20 0x20 # disable RX port 1
CMD_WAIT_MILLIS       1 100



